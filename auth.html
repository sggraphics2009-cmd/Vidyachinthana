<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>පිවිසුම / ලියාපදිංචිය - විද්‍යා චින්තන</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dynamic-island">
    <div class="island-logo">විද්‍යා චින්තන</div>
    <div class="island-nav">
      <a href="index.html">මුල් පිටුව</a>
      <a href="#" id="archiveLink">සංරක්ෂිත කලාප</a>
      <a href="#" id="creatorsLink">නිර්මාණකරුවෝ</a>
    </div>
    <div class="island-icons">
      <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
      <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">මුල් පිටුව</a>
    <a href="#" id="mobileArchiveLink">සංරක්ෂිත කලාප</a>
    <a href="#" id="mobileCreatorsLink">නිර්මාණකරුවෝ</a>
    <a href="auth.html">පිවිසුම / ලියාපදිංචිය</a>
  </div>

  <main class="container" style="margin-top: 100px; max-width: 500px;">
    <div class="card" style="padding: 2rem;">
      <div style="display: flex; gap: 1rem; margin-bottom: 1rem;">
        <button id="loginTabBtn" class="btn-primary" style="flex:1;">පිවිසෙන්න</button>
        <button id="registerTabBtn" class="btn-outline" style="flex:1;">ලියාපදිංචි වන්න</button>
      </div>
      <div id="loginForm">
        <form id="signinForm">
          <div class="form-group"><label>ඊමේල්</label><input type="email" id="signinEmail" required></div>
          <div class="form-group"><label>මුරපදය</label><input type="password" id="signinPassword" required></div>
          <button type="submit" class="btn-primary" style="width:100%;">පිවිසෙන්න</button>
        </form>
      </div>
      <div id="registerForm" style="display: none;">
        <form id="signupForm">
          <div class="form-group"><label>නම</label><input type="text" id="signupName" required></div>
          <div class="form-group"><label>ඊමේල්</label><input type="email" id="signupEmail" required></div>
          <div class="form-group"><label>මුරපදය</label><input type="password" id="signupPassword" required></div>
          <button type="submit" class="btn-primary" style="width:100%;">ලියාපදිංචි වන්න</button>
        </form>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
