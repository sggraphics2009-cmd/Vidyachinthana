<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover">
    <title>පිවිසුම / ලියාපදිංචිය - විද්‍යා චින්තන</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ========== APEX40 FONT ========== */
        @font-face {
            font-family: 'Apex40';
            src: url('https://font.akasa.lk/apex040.font') format('truetype');
            font-weight: normal;
            font-style: normal;
            font-display: swap;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Light & Bright Color Scheme */
        :root {
            --bg-body: #F9FAFB;
            --bg-card: #FFFFFF;
            --text-primary: #111827;
            --text-secondary: #4B5563;
            --border: #E5E7EB;
            --accent-primary: #3B82F6;
            --accent-secondary: #F59E0B;
            --shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            --shadow-hover: 0 20px 30px -12px rgba(0,0,0,0.1);
            --island-bg: rgba(255,255,255,0.7);
            --island-blur: blur(20px);
            --footer-bg: rgba(255,255,255,0.8);
            --footer-blur: blur(16px);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-body);
            color: var(--text-primary);
            line-height: 1.5;
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            max-width: 1280px;
            margin: 0 auto;
            padding: 0 1rem;
        }

        /* ========== DYNAMIC ISLAND HEADER ========== */
        .dynamic-island {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            width: auto;
            min-width: 260px;
            max-width: calc(100% - 2rem);
            background: var(--island-bg);
            backdrop-filter: var(--island-blur);
            border-radius: 50px;
            box-shadow: var(--shadow);
            transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            border: 1px solid rgba(0,0,0,0.05);
        }

        .dynamic-island.shrink {
            top: 10px;
            transform: translateX(-50%) scale(0.95);
        }

        .island-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.8rem;
            padding: 0.5rem 1rem;
        }

        .logo-sinhala {
            font-family: 'Apex40', 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: normal;
            background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            white-space: nowrap;
        }

        .island-nav {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .island-nav a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            font-size: 0.85rem;
            transition: color 0.2s;
            position: relative;
            white-space: nowrap;
        }
        .island-nav a::after {
            content: '';
            position: absolute;
            bottom: -4px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-secondary);
            transition: width 0.2s;
        }
        .island-nav a:hover::after {
            width: 100%;
        }
        .island-nav a:hover {
            color: var(--accent-primary);
        }

        .island-icons {
            display: flex;
            gap: 0.4rem;
            align-items: center;
        }
        .icon-btn {
            background: transparent;
            border: none;
            font-size: 0.9rem;
            cursor: pointer;
            color: var(--text-primary);
            transition: transform 0.2s, color 0.2s;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
        }
        .icon-btn:hover {
            background: rgba(0,0,0,0.05);
            color: var(--accent-primary);
            transform: scale(1.05);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            gap: 4px;
            cursor: pointer;
        }
        .hamburger span {
            width: 20px;
            height: 2px;
            background: var(--text-primary);
        }

        .mobile-menu {
            position: fixed;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: calc(100% - 2rem);
            max-width: 380px;
            background: var(--island-bg);
            backdrop-filter: var(--island-blur);
            border-radius: 28px;
            padding: 1rem;
            display: none;
            flex-direction: column;
            gap: 1rem;
            z-index: 999;
            border: 1px solid rgba(0,0,0,0.05);
        }
        .mobile-menu.active {
            display: flex;
        }
        .mobile-menu a {
            text-decoration: none;
            color: var(--text-primary);
            padding: 0.5rem;
            font-weight: 500;
            border-radius: 2rem;
        }

        main {
            padding-top: 85px;
        }

        /* ========== ISSUE STYLES (reused for auth card) ========== */
        .current-issue {
            background: var(--bg-card);
            border-radius: 1.5rem;
            overflow: hidden;
            margin: 1.5rem 0;
            box-shadow: var(--shadow);
        }
        .issue-header {
            padding: 1.5rem;
            border-bottom: 1px solid var(--border);
        }
        .issue-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .btn-primary {
            background: var(--accent-primary);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 2rem;
            font-weight: 500;
            cursor: pointer;
            color: white;
            transition: all 0.2s;
            font-size: 0.9rem;
        }
        .btn-primary:hover {
            background: var(--accent-secondary);
            transform: translateY(-2px);
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }
        .form-group input {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid var(--border);
            border-radius: 2rem;
            background: var(--bg-card);
            color: var(--text-primary);
        }
        @media (max-width: 768px) {
            .issue-title {
                font-size: 1.5rem;
            }
            .island-nav {
                display: none;
            }
            .hamburger {
                display: flex;
            }
        }
    </style>
</head>
<body>

<!-- Dynamic Island Header -->
<div class="dynamic-island" id="dynamicIsland">
    <div class="island-content">
        <div class="logo-sinhala">විද්‍යා චින්තන</div>
        <div class="island-nav">
            <a href="index.html">මුල් පිටුව</a>
            <a href="#" id="archiveLink">සංරක්ෂිත කලාප</a>
            <a href="#" id="creatorsLink">නිර්මාණකරුවෝ</a>
        </div>
        <div class="island-icons">
            <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </div>
    </div>
</div>

<!-- Mobile Menu -->
<div class="mobile-menu" id="mobileMenu">
    <a href="index.html">මුල් පිටුව</a>
    <a href="#" id="mobileArchiveLink">සංරක්ෂිත කලාප</a>
    <a href="#" id="mobileCreatorsLink">නිර්මාණකරුවෝ</a>
    <a href="auth.html">පිවිසුම / ලියාපදිංචිය</a>
</div>

<main>
    <div class="container" style="max-width: 500px;">
        <div class="current-issue" style="margin-top: 1rem;">
            <div class="issue-header" style="border-bottom: none;">
                <h2 class="issue-title">පිවිසුම / ලියාපදිංචිය</h2>
            </div>
            <div style="padding: 0 1.5rem 1.5rem;">
                <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem;">
                    <button id="loginTabBtn" class="btn-primary" style="flex:1;">පිවිසෙන්න</button>
                    <button id="registerTabBtn" class="btn-primary" style="background: var(--accent-secondary); flex:1;">ලියාපදිංචි වන්න</button>
                </div>

                <!-- Login Form -->
                <div id="loginForm">
                    <form id="signinForm">
                        <div class="form-group">
                            <label>ඊමේල්</label>
                            <input type="email" id="signinEmail" required>
                        </div>
                        <div class="form-group">
                            <label>මුරපදය</label>
                            <input type="password" id="signinPassword" required>
                        </div>
                        <button type="submit" class="btn-primary" style="width:100%;">පිවිසෙන්න</button>
                    </form>
                </div>

                <!-- Register Form -->
                <div id="registerForm" style="display: none;">
                    <form id="signupForm">
                        <div class="form-group">
                            <label>නම</label>
                            <input type="text" id="signupName" required>
                        </div>
                        <div class="form-group">
                            <label>ඊමේල්</label>
                            <input type="email" id="signupEmail" required>
                        </div>
                        <div class="form-group">
                            <label>මුරපදය</label>
                            <input type="password" id="signupPassword" required>
                        </div>
                        <button type="submit" class="btn-primary" style="width:100%;">ලියාපදිංචි වන්න</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</main>

<script type="importmap">
    {
        "imports": {
            "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm"
        }
    }
</script>
<script type="module">
    import { createClient } from '@supabase/supabase-js';

    // ===================== SUPABASE CONFIG =====================
    // ⚠️ ඔබගේ Supabase URL සහ anon key මෙහි යොදන්න
    const SUPABASE_URL = 'https://qrbqdpxyuhcxefyztdmb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyYnFkcHh5dWhjeGVmeXp0ZG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTU4MDcsImV4cCI6MjA5MDI5MTgwN30.5w1oC2DV9yEzA6oOWUqne5QF4Snu_Kq7vn5zneGyuK4';
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // ===================== UI ELEMENTS =====================
    const loginTab = document.getElementById('loginTabBtn');
    const registerTab = document.getElementById('registerTabBtn');
    const loginDiv = document.getElementById('loginForm');
    const registerDiv = document.getElementById('registerForm');

    loginTab.addEventListener('click', () => {
        loginDiv.style.display = 'block';
        registerDiv.style.display = 'none';
    });
    registerTab.addEventListener('click', () => {
        loginDiv.style.display = 'none';
        registerDiv.style.display = 'block';
    });

    // ===================== SIGN IN =====================
    document.getElementById('signinForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('signinEmail').value;
        const password = document.getElementById('signinPassword').value;

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
            alert('පිවිසීම අසාර්ථකයි: ' + error.message);
        } else {
            window.location.href = 'index.html';
        }
    });

    // ===================== SIGN UP (First user becomes admin) =====================
    document.getElementById('signupForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;

        // Check if any users exist in public.users
        const { count, error: countError } = await supabase
            .from('users')
            .select('*', { count: 'exact', head: true });

        const isFirstUser = (count === 0);

        const { data, error } = await supabase.auth.signUp({
            email,
            password,
            options: { data: { display_name: name } }
        });

        if (error) {
            alert('ලියාපදිංචිය අසාර්ථකයි: ' + error.message);
            return;
        }

        // Insert into public.users with correct role
        const role = isFirstUser ? 'admin' : 'author';
        const { error: insertError } = await supabase
            .from('users')
            .insert({ id: data.user.id, email, display_name: name, role });

        if (insertError) {
            console.error('Error inserting into users:', insertError);
            alert('ගිණුම සාදන ලදී, නමුත් පැතිකඩ සුරැකීමේ දෝෂයක් ඇත. කරුණාකර පරිපාලක අමතන්න.');
        } else {
            alert(isFirstUser
                ? 'පළමු පරිශීලකයා ලෙස පරිපාලක ගිණුම සාදන ලදී. කරුණාකර පිවිසෙන්න.'
                : 'ලියාපදිංචිය සාර්ථකයි! කරුණාකර පිවිසෙන්න.');
        }
        loginTab.click(); // switch to login tab
        e.target.reset();
    });

    // ===================== DARK MODE TOGGLE =====================
    const themeToggle = document.getElementById('themeToggle');
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark');
        // simple dark mode override (we don't have full dark CSS here, but we can add a minimal one)
        const style = document.createElement('style');
        style.textContent = `
            .dark {
                --bg-body: #0f172a;
                --bg-card: #1e293b;
                --text-primary: #f1f5f9;
                --text-secondary: #94a3b8;
                --border: #334155;
                --accent-primary: #60a5fa;
                --accent-secondary: #fbbf24;
            }
        `;
        document.head.appendChild(style);
    }
    themeToggle.addEventListener('click', () => {
        document.body.classList.toggle('dark');
        localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
        location.reload(); // simple reload to apply dark mode properly
    });

    // ===================== MOBILE MENU =====================
    const hamburger = document.getElementById('hamburger');
    const mobileMenu = document.getElementById('mobileMenu');
    hamburger.addEventListener('click', (e) => {
        e.stopPropagation();
        mobileMenu.classList.toggle('active');
    });
    document.addEventListener('click', (e) => {
        if (!mobileMenu.contains(e.target) && !hamburger.contains(e.target)) {
            mobileMenu.classList.remove('active');
        }
    });

    // Dynamic island shrink
    window.addEventListener('scroll', () => {
        const island = document.getElementById('dynamicIsland');
        if (window.scrollY > 50) island.classList.add('shrink');
        else island.classList.remove('shrink');
    });

    // Placeholder links
    document.getElementById('archiveLink')?.addEventListener('click', (e) => { e.preventDefault(); alert('සංරක්ෂිත කලාප පිටුව පසුව එකතු වේ.'); });
    document.getElementById('creatorsLink')?.addEventListener('click', (e) => { e.preventDefault(); alert('නිර්මාණකරුවන් පිටුව පසුව එකතු වේ.'); });
    document.getElementById('mobileArchiveLink')?.addEventListener('click', (e) => { e.preventDefault(); mobileMenu.classList.remove('active'); alert('සංරක්ෂිත කලාප පිටුව පසුව එකතු වේ.'); });
    document.getElementById('mobileCreatorsLink')?.addEventListener('click', (e) => { e.preventDefault(); mobileMenu.classList.remove('active'); alert('නිර්මාණකරුවන් පිටුව පසුව එකතු වේ.'); });
</script>
</body>
</html>
