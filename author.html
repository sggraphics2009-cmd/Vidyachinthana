<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes, viewport-fit=cover">
    <title>කතෘ පැනලය - විද්‍යා චින්තන</title>
    <!-- include same CSS as index.html (copy entire style block) -->
    <style>/* same CSS from index.html */</style>
</head>
<body>
    <!-- Dynamic Island Header and mobile menu (same as index.html) -->
    <main class="container" style="margin-top:100px;">
        <div class="current-issue" style="margin:0; padding:1.5rem;">
            <h2 class="issue-title">කතෘ පැනලය</h2>
            <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
                <div style="flex:2;">
                    <div class="articles-in-issue" style="padding:0;">
                        <h3>නව ලිපියක් ඉදිරිපත් කරන්න</h3>
                        <form id="submitArticleForm">
                            <div class="form-group"><label>මාතෘකාව *</label><input type="text" id="title" required style="width:100%; padding:0.6rem; border-radius:2rem; border:1px solid var(--border);"></div>
                            <div class="form-group"><label>ප්‍රවර්ගය</label><select id="category" style="width:100%; padding:0.6rem; border-radius:2rem;"><option>භෞතික විද්‍යාව</option><option>ජීව විද්‍යාව</option><option>රසායන විද්‍යාව</option><option>තාක්ෂණය</option><option>තාරකා විද්‍යාව</option></select></div>
                            <div class="form-group"><label>ආවරණ රූපය</label><input type="file" id="coverImage" accept="image/*"></div>
                            <div class="form-group"><label>අන්තර්ගතය (Markdown) *</label><textarea id="content" rows="8" required style="width:100%; padding:0.6rem; border-radius:1rem;"></textarea></div>
                            <button type="submit" class="btn-primary">ලිපිය ඉදිරිපත් කරන්න</button>
                        </form>
                    </div>
                </div>
                <div style="flex:1;">
                    <div class="articles-in-issue" style="padding:0;">
                        <h3>මගේ ලිපි</h3>
                        <div id="myArticles"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <!-- Footer (same) -->
    <script type="importmap">
        { "imports": { "@supabase/supabase-js": "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm" } }
    </script>
    <script type="module">
        import { createClient } from '@supabase/supabase-js';

        const SUPABASE_URL = 'https://qrbqdpxyuhcxefyztdmb.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyYnFkcHh5dWhjeGVmeXp0ZG1iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTU4MDcsImV4cCI6MjA5MDI5MTgwN30.5w1oC2DV9yEzA6oOWUqne5QF4Snu_Kq7vn5zneGyuK4';
        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function getCurrentUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return null;
            const { data: profile } = await supabase.from('users').select('*').eq('id', user.id).single();
            return { ...user, ...profile };
        }

        const user = await getCurrentUser();
        if (!user) window.location.href = 'auth.html';

        async function loadMyArticles() {
            const { data: articles } = await supabase.from('articles').select('id, title, status, submitted_at').eq('author_id', user.id).order('submitted_at', { ascending: false });
            const container = document.getElementById('myArticles');
            if (!articles || articles.length === 0) {
                container.innerHTML = '<p>ඔබ තවම ලිපි ඉදිරිපත් කර නැත.</p>';
                return;
            }
            container.innerHTML = articles.map(art => `
                <div style="border-bottom:1px solid var(--border); padding:0.5rem 0;">
                    <strong>${escapeHtml(art.title)}</strong><br>
                    <small>${art.status === 'pending' ? 'සමාලෝචනයේ' : art.status === 'approved' ? 'අනුමත' : 'ප්‍රතික්ෂේප'} | ${new Date(art.submitted_at).toLocaleDateString()}</small>
                </div>
            `).join('');
        }

        document.getElementById('submitArticleForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('title').value;
            const content = document.getElementById('content').value;
            const category = document.getElementById('category').value;
            const coverFile = document.getElementById('coverImage').files[0];

            if (!title || !content) {
                alert('කරුණාකර මාතෘකාව සහ අන්තර්ගතය පුරවන්න.');
                return;
            }

            let coverUrl = null;
            if (coverFile) {
                const fileExt = coverFile.name.split('.').pop();
                const fileName = `${Date.now()}.${fileExt}`;
                const { error } = await supabase.storage.from('article-images').upload(`articles/${fileName}`, coverFile);
                if (error) {
                    alert('රූපය උඩුගත කිරීම අසාර්ථකයි: ' + error.message);
                    return;
                }
                const { data: { publicUrl } } = supabase.storage.from('article-images').getPublicUrl(`articles/${fileName}`);
                coverUrl = publicUrl;
            }

            const { error } = await supabase.from('articles').insert({
                title, content, cover_image: coverUrl, category,
                author_id: user.id, status: 'pending'
            });
            if (error) {
                alert('ලිපිය ඉදිරිපත් කිරීම අසාර්ථකයි: ' + error.message);
            } else {
                alert('ලිපිය සාර්ථකව ඉදිරිපත් කරන ලදී.');
                document.getElementById('submitArticleForm').reset();
                loadMyArticles();
            }
        });

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;');
        }

        loadMyArticles();

        // Add theme toggle, mobile menu, etc. (copy from index.html)
    </script>
</body>
</html>
