<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>කතෘ පැනලය - විද්‍යා චින්තන</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="dynamic-island">
    <div class="island-logo">විද්‍යා චින්තන</div>
    <div class="island-nav">
      <a href="index.html">මුල් පිටුව</a>
      <a href="#" id="archiveLink">සංරක්ෂිත කලාප</a>
      <a href="#" id="creatorsLink">නිර්මාණකරුවෝ</a>
    </div>
    <div class="island-icons">
      <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
      <button class="icon-btn" id="userIcon"><i class="fas fa-user"></i></button>
      <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">මුල් පිටුව</a>
    <a href="#" id="mobileArchiveLink">සංරක්ෂිත කලාප</a>
    <a href="#" id="mobileCreatorsLink">නිර්මාණකරුවෝ</a>
    <a href="auth.html">පිවිසුම / ලියාපදිංචිය</a>
  </div>

  <main class="container" style="margin-top: 100px;">
    <h1>කතෘ පැනලය</h1>
    <div style="display: flex; gap: 2rem; flex-wrap: wrap;">
      <div style="flex: 2;">
        <div class="card" style="padding: 1.5rem;">
          <h3>නව ලිපියක් ඉදිරිපත් කරන්න</h3>
          <form id="submitArticleForm">
            <div class="form-group"><label>මාතෘකාව *</label><input type="text" id="title" required></div>
            <div class="form-group"><label>ප්‍රවර්ගය</label><select id="category"><option>භෞතික විද්‍යාව</option><option>ජීව විද්‍යාව</option><option>රසායන විද්‍යාව</option><option>තාක්ෂණය</option><option>තාරකා විද්‍යාව</option></select></div>
            <div class="form-group"><label>ආවරණ රූපය</label><input type="file" id="coverImage" accept="image/*"></div>
            <div class="form-group"><label>අන්තර්ගතය (Markdown) *</label><textarea id="content" rows="10" required></textarea><small>Markdown භාවිතා කළ හැක.</small></div>
            <button type="submit" class="btn-primary">ලිපිය ඉදිරිපත් කරන්න</button>
          </form>
        </div>
      </div>
      <div style="flex: 1;">
        <div class="card" style="padding: 1.5rem;">
          <h3>මගේ ලිපි</h3>
          <div id="myArticles"></div>
        </div>
      </div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/author.js"></script>
</body>
</html>
