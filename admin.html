<!DOCTYPE html>
<html lang="si">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>පරිපාලක පැනලය - විද්‍යා චින්තන</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="dynamic-island">
    <div class="island-logo">විද්‍යා චින්තන</div>
    <div class="island-nav">
      <a href="index.html">මුල් පිටුව</a>
      <a href="#" id="archiveLink">සංරක්ෂිත කලාප</a>
      <a href="#" id="creatorsLink">නිර්මාණකරුවෝ</a>
    </div>
    <div class="island-icons">
      <button class="icon-btn" id="themeToggle"><i class="fas fa-moon"></i></button>
      <button class="icon-btn" id="userIcon"><i class="fas fa-user"></i></button>
      <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
    </div>
  </div>
  <div class="mobile-menu" id="mobileMenu">
    <a href="index.html">මුල් පිටුව</a>
    <a href="#" id="mobileArchiveLink">සංරක්ෂිත කලාප</a>
    <a href="#" id="mobileCreatorsLink">නිර්මාණකරුවෝ</a>
    <a href="auth.html">පිවිසුම / ලියාපදිංචිය</a>
  </div>

  <main class="container" style="margin-top: 100px;">
    <h1>පරිපාලක පැනලය</h1>
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem;">
      <div class="card" style="padding: 1.2rem;">
        <h3>සමාලෝචනයට ඇති ලිපි</h3>
        <div id="pendingArticles"></div>
      </div>
      <div class="card" style="padding: 1.2rem;">
        <h3>නව කලාපයක් සාදන්න</h3>
        <form id="createIssueForm">
          <div class="form-group"><label>කලාපයේ මාතෘකාව *</label><input type="text" id="issueTitle" required></div>
          <div class="form-group"><label>ආවරණ රූපය</label><input type="file" id="issueCover" accept="image/*"></div>
          <div class="form-group"><label>ප්‍රකාශන දිනය *</label><input type="date" id="issueDate" required></div>
          <div class="form-group"><label>මෙම කලාපයට ඇතුළත් කරන ලිපි</label><div id="articlesForIssue"></div></div>
          <button type="submit" class="btn-primary">කලාපය ප්‍රකාශයට පත් කරන්න</button>
        </form>
      </div>
    </div>
    <div class="card" style="padding: 1.2rem; margin-top: 2rem;">
      <h3>පරිශීලක කළමනාකරණය</h3>
      <div id="userList"></div>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase.js"></script>
  <script src="js/admin.js"></script>
</body>
</html>
