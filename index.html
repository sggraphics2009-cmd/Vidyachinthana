<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My E-Journal · පුද්ගලික දිනපොත</title>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #fef7ec;
            color: #2c241a;
            padding: 2rem 1rem;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .card {
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            border: 1px solid #f0e3d4;
        }
        h2 { font-size: 1.8rem; margin-bottom: 1.2rem; color: #4f3a28; }
        .form-group { margin-bottom: 1rem; }
        input, textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1px solid #e2d2c0;
            border-radius: 2rem;
            font-size: 1rem;
            background: #fffcf8;
        }
        button {
            background: #9b7b5c;
            color: white;
            border: none;
            padding: 0.7rem 1.5rem;
            border-radius: 2rem;
            cursor: pointer;
        }
        button:hover { background: #7c5f44; }
        .btn-outline {
            background: transparent;
            border: 1px solid #9b7b5c;
            color: #9b7b5c;
        }
        .flex-between { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .hidden { display: none; }
        .error-msg { color: #c25d2e; font-size: 0.85rem; margin-top: 0.5rem; }
        .entry-card {
            background: #fffcf7;
            border-radius: 1.5rem;
            padding: 1.2rem 1.5rem;
            margin-bottom: 1.5rem;
            border-left: 5px solid #e2c7a7;
        }
        .entry-title { font-size: 1.5rem; font-weight: 600; margin-bottom: 0.3rem; }
        .entry-meta { font-size: 0.8rem; color: #b29573; margin-bottom: 1rem; display: flex; gap: 0.8rem; flex-wrap: wrap; }
        .entry-tag { background: #efe2d4; padding: 0.2rem 0.7rem; border-radius: 30px; font-size: 0.7rem; }
        .entry-content { line-height: 1.6; margin-bottom: 1rem; }
        .delete-btn { background: #e2c7aa; color: #5e3e2b; padding: 0.3rem 1rem; font-size: 0.8rem; }
        .add-form { background: #fff9f2; border-radius: 1.5rem; padding: 1.5rem; margin-top: 2rem; }
    </style>
</head>
<body>
<div class="container">
    <!-- Auth Section -->
    <div id="authSection" class="card">
        <h2>📖 ඔබගේ පුද්ගලික දිනපොතට සාදරයෙන්</h2>
        <div id="loginForm">
            <div class="form-group"><input type="email" id="loginEmail" placeholder="විද්‍යුත් තැපෑල"></div>
            <div class="form-group"><input type="password" id="loginPassword" placeholder="මුරපදය"></div>
            <button id="loginBtn">පිවිසෙන්න</button>
            <button id="showRegisterBtn" class="btn-outline">නව ගිණුමක්</button>
            <div id="authError" class="error-msg"></div>
        </div>
        <div id="registerForm" class="hidden">
            <div class="form-group"><input type="email" id="regEmail" placeholder="විද්‍යුත් තැපෑල"></div>
            <div class="form-group"><input type="password" id="regPassword" placeholder="මුරපදය"></div>
            <div class="form-group"><input type="password" id="regConfirm" placeholder="මුරපදය නැවත"></div>
            <button id="registerBtn">ලියාපදිංචි වන්න</button>
            <button id="showLoginBtn" class="btn-outline">ආපසු පිවිසුමට</button>
            <div id="regError" class="error-msg"></div>
        </div>
    </div>

    <!-- Journal Section -->
    <div id="journalSection" class="hidden">
        <div class="card">
            <div class="flex-between">
                <h2>📓 මගේ දිනපොත</h2>
                <button id="logoutBtn">පිටවන්න</button>
            </div>
            <div id="entriesList"></div>
            <div class="add-form">
                <h3>✨ අලුත් සටහනක්</h3>
                <div class="form-group"><input type="text" id="entryTitle" placeholder="සිරස්තලය"></div>
                <div class="form-group"><textarea id="entryContent" rows="4" placeholder="අන්තර්ගතය (Markdown)"></textarea></div>
                <div class="form-group"><input type="text" id="entryTags" placeholder="ටැග්ස් (කොමාවෙන් වෙන් කරන්න)"></div>
                <button id="addEntryBtn">සටහන එකතු කරන්න</button>
            </div>
        </div>
    </div>
</div>

<script>
    // TODO: ඔබගේ Firebase Config එක පහතට අලවන්න
    const firebaseConfig = {
  apiKey: "AIzaSyAXGfmIU4MgHv5BeiI6_x7FTaXjHMwoQ5k",
  authDomain: "vidyachinthana-61d94.firebaseapp.com",
  projectId: "vidyachinthana-61d94",
  storageBucket: "vidyachinthana-61d94.firebasestorage.app",
  messagingSenderId: "763776055414",
  appId: "1:763776055414:web:4b9ed6eefb1cd00616c757"
};
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // DOM elements
    const authSection = document.getElementById('authSection');
    const journalSection = document.getElementById('journalSection');
    const loginFormDiv = document.getElementById('loginForm');
    const registerFormDiv = document.getElementById('registerForm');
    const entriesListDiv = document.getElementById('entriesList');

    function showAuthUI() {
        authSection.classList.remove('hidden');
        journalSection.classList.add('hidden');
        loginFormDiv.classList.remove('hidden');
        registerFormDiv.classList.add('hidden');
        document.getElementById('authError').innerText = '';
        document.getElementById('regError').innerText = '';
    }
    function showJournalUI() {
        authSection.classList.add('hidden');
        journalSection.classList.remove('hidden');
        loadEntries();
    }

    async function loadEntries() {
        const user = auth.currentUser;
        if (!user) return;
        const entriesRef = db.collection('users').doc(user.uid).collection('entries');
        try {
            const snapshot = await entriesRef.orderBy('createdAt', 'desc').get();
            let html = '';
            if (snapshot.empty) {
                html = '<p style="color:#b29573;">තවම සටහනක් නැත. පළමු සටහන එකතු කරන්න.</p>';
            } else {
                snapshot.forEach(doc => {
                    const entry = doc.data();
                    const title = escapeHtml(entry.title) || 'නිර්නාමික';
                    let dateStr = 'දිනයක් නැත';
                    if (entry.createdAt) {
                        const d = entry.createdAt.toDate();
                        dateStr = d.toLocaleDateString('si-LK', { year: 'numeric', month: 'long', day: 'numeric' });
                    }
                    const tags = entry.tags || [];
                    const contentHtml = marked.parse(entry.content || '');
                    const tagsHtml = tags.map(t => `<span class="entry-tag">#${escapeHtml(t)}</span>`).join('');
                    html += `
                        <div class="entry-card" data-id="${doc.id}">
                            <div class="entry-title">${title}</div>
                            <div class="entry-meta"><span>📅 ${dateStr}</span> ${tagsHtml}</div>
                            <div class="entry-content">${contentHtml}</div>
                            <div><button class="delete-btn" data-id="${doc.id}">මකන්න</button></div>
                        </div>
                    `;
                });
            }
            entriesListDiv.innerHTML = html;
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', async (e) => {
                    const id = btn.getAttribute('data-id');
                    if (confirm('මෙම සටහන ස්ථිරවම මකා දමන්නද?')) {
                        await db.collection('users').doc(user.uid).collection('entries').doc(id).delete();
                        loadEntries();
                    }
                });
            });
        } catch (err) {
            entriesListDiv.innerHTML = '<p class="error-msg">සටහන් ලබාගැනීමේ දෝෂයක්.</p>';
        }
    }

    async function addEntry() {
        const user = auth.currentUser;
        if (!user) return;
        const title = document.getElementById('entryTitle').value.trim();
        const content = document.getElementById('entryContent').value.trim();
        const tagsRaw = document.getElementById('entryTags').value.trim();
        const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim()).filter(t => t) : [];
        if (!title) { alert('සිරස්තලය අනිවාර්යයි.'); return; }
        const entryData = {
            title: title,
            content: content,
            tags: tags,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        try {
            await db.collection('users').doc(user.uid).collection('entries').add(entryData);
            document.getElementById('entryTitle').value = '';
            document.getElementById('entryContent').value = '';
            document.getElementById('entryTags').value = '';
            loadEntries();
        } catch (err) {
            alert('සටහන එකතු කිරීම අසාර්ථකයි: ' + err.message);
        }
    }

    async function register() {
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value;
        const confirm = document.getElementById('regConfirm').value;
        if (password !== confirm) { document.getElementById('regError').innerText = 'මුරපද දෙක ගැලපෙන්නේ නැත.'; return; }
        try {
            await auth.createUserWithEmailAndPassword(email, password);
        } catch (err) {
            document.getElementById('regError').innerText = err.message;
        }
    }

    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        try {
            await auth.signInWithEmailAndPassword(email, password);
        } catch (err) {
            document.getElementById('authError').innerText = 'විද්‍යුත් තැපෑල හෝ මුරපදය වැරදියි.';
        }
    }

    auth.onAuthStateChanged(user => {
        if (user) showJournalUI();
        else showAuthUI();
    });

    document.getElementById('loginBtn').addEventListener('click', login);
    document.getElementById('registerBtn').addEventListener('click', register);
    document.getElementById('showRegisterBtn').onclick = () => { loginFormDiv.classList.add('hidden'); registerFormDiv.classList.remove('hidden'); };
    document.getElementById('showLoginBtn').onclick = () => { registerFormDiv.classList.add('hidden'); loginFormDiv.classList.remove('hidden'); };
    document.getElementById('logoutBtn').addEventListener('click', () => auth.signOut());
    document.getElementById('addEntryBtn').addEventListener('click', addEntry);

    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
</script>
</body>
  </html>
