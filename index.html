                <h3>🤖 ඔබ උනන්දු විය හැකි ලිපි</h3>

<script>
    // ==================== 🔧 TODO: ඔබගේ Firebase Config එක මෙහි අලවන්න ====================
    const firebaseConfig = {
  apiKey: "AIzaSyAXGfmIU4MgHv5BeiI6_x7FTaXjHMwoQ5k",
  authDomain: "vidyachinthana-61d94.firebaseapp.com",
  projectId: "vidyachinthana-61d94",
  storageBucket: "vidyachinthana-61d94.firebasestorage.app",
  messagingSenderId: "763776055414",
  appId: "1:763776055414:web:4b9ed6eefb1cd00616c757"
};
    // =======================================================================

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    // Global state
    let currentUser = null;
    let currentUserDoc = null;
    let allArticles = []; // cache for recommendations

    // DOM elements
    const publicDiv = document.getElementById('publicArticles');
    const authSection = document.getElementById('authSection');
    const userDashboard = document.getElementById('userDashboard');
    const adminPanel = document.getElementById('adminPanel');
    const userStatusSpan = document.getElementById('userStatus');
    const loginShowBtn = document.getElementById('loginShowBtn');
    const logoutBtn = document.getElementById('logoutBtn');

    // Helper: escape HTML
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // Load all articles (public)
    async function loadPublicArticles() {
        const snapshot = await db.collection('articles').where('status', '==', 'published').orderBy('publishedAt', 'desc').get();
        allArticles = [];
        let html = '<div class="articles-grid">';
        snapshot.forEach(doc => {
            const art = doc.data();
            art.id = doc.id;
            allArticles.push(art);
            const excerpt = art.content ? art.content.substring(0, 120) + '...' : '';
            const tagsHtml = (art.tags || []).map(t => `<span class="card-tag">#${escapeHtml(t)}</span>`).join('');
            html += `
                <div class="article-card" data-id="${doc.id}">
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(art.title)}</div>
                        <div class="card-meta">
                            <span>📅 ${art.publishedAt ? new Date(art.publishedAt.toDate()).toLocaleDateString('si-LK') : ''}</span>
                            <span>✍️ ${escapeHtml(art.authorName || 'කතෘ')}</span>
                            ${tagsHtml}
                        </div>
                        <div class="card-excerpt">${escapeHtml(excerpt)}</div>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        publicDiv.innerHTML = html;

        // Add click listeners for each card
        document.querySelectorAll('.article-card').forEach(card => {
            card.addEventListener('click', (e) => {
                const id = card.getAttribute('data-id');
                const article = allArticles.find(a => a.id === id);
                if (article) openArticleModal(article);
            });
        });
    }

    // Open modal with full article
    async function openArticleModal(article) {
        const modal = document.getElementById('articleModal');
        const contentDiv = document.getElementById('modalArticleContent');
        const actionsDiv = document.getElementById('modalActions');
        const markedHtml = marked.parse(article.content || '');
        contentDiv.innerHTML = `
            <h2>${escapeHtml(article.title)}</h2>
            <div class="entry-meta" style="margin-bottom:1rem; color:#b29573;">
                ${article.publishedAt ? new Date(article.publishedAt.toDate()).toLocaleDateString('si-LK') : ''} | ${escapeHtml(article.authorName || 'කතෘ')}
                ${(article.tags || []).map(t => `<span class="card-tag" style="background:#efe2d4;">#${escapeHtml(t)}</span>`).join('')}
            </div>
            <div>${markedHtml}</div>
        `;
        actionsDiv.innerHTML = '';
        if (currentUser) {
            // Check if saved
            const savedRef = db.collection('users').doc(currentUser.uid).collection('saved').doc(article.id);
            const savedDoc = await savedRef.get();
            const isSaved = savedDoc.exists;
            const saveBtn = document.createElement('button');
            saveBtn.textContent = isSaved ? 'සුරකින ලදි' : 'සුරකින්න';
            saveBtn.onclick = async () => {
                if (isSaved) {
                    await savedRef.delete();
                    saveBtn.textContent = 'සුරකින්න';
                } else {
                    await savedRef.set({ articleId: article.id, savedAt: firebase.firestore.FieldValue.serverTimestamp() });
                    saveBtn.textContent = 'සුරකින ලදි';
                }
                // Also record view in history
                const historyRef = db.collection('users').doc(currentUser.uid).collection('history').doc(article.id);
                await historyRef.set({ articleId: article.id, viewedAt: firebase.firestore.FieldValue.serverTimestamp() });
                // Update recommendations after interaction
                updateRecommendations();
            };
            actionsDiv.appendChild(saveBtn);
        }
        // Record view in history (if logged in)
        if (currentUser) {
            const historyRef = db.collection('users').doc(currentUser.uid).collection('history').doc(article.id);
            await historyRef.set({ articleId: article.id, viewedAt: firebase.firestore.FieldValue.serverTimestamp() });
            updateRecommendations();
        }
        modal.classList.add('active');
    }

    // Update recommendations based on user's history/saved tags
    async function updateRecommendations() {
        if (!currentUser) return;
        // Get user's history & saved articles to collect tags
        const historySnap = await db.collection('users').doc(currentUser.uid).collection('history').get();
        const savedSnap = await db.collection('users').doc(currentUser.uid).collection('saved').get();
        const interactedIds = new Set();
        historySnap.forEach(doc => interactedIds.add(doc.id));
        savedSnap.forEach(doc => interactedIds.add(doc.id));

        // Fetch all articles to get tags
        const allArts = allArticles.filter(a => a.status === 'published');
        const tagFrequency = {};
        for (let art of allArts) {
            if (interactedIds.has(art.id)) {
                (art.tags || []).forEach(tag => {
                    tagFrequency[tag] = (tagFrequency[tag] || 0) + 1;
                });
            }
        }
        // Score articles based on tag overlap
        const scored = allArts.map(art => {
            if (interactedIds.has(art.id)) return { art, score: -1 }; // already interacted
            let score = 0;
            (art.tags || []).forEach(tag => {
                score += tagFrequency[tag] || 0;
            });
            return { art, score };
        });
        const topRecommendations = scored.filter(s => s.score > 0).sort((a,b) => b.score - a.score).slice(0, 5);
        const recDiv = document.getElementById('recommendList');
        if (topRecommendations.length === 0) {
            recDiv.innerHTML = '<p>තවම නිර්දේශ සඳහා ප්‍රමාණවත් දත්ත නැත. ලිපි කියවන්න, සුරකින්න.</p>';
            return;
        }
        let html = '<div class="articles-grid" style="grid-template-columns: repeat(auto-fill, minmax(250px,1fr));">';
        topRecommendations.forEach(({art}) => {
            html += `
                <div class="article-card" data-id="${art.id}" style="cursor:pointer;">
                    <div class="card-content">
                        <div class="card-title">${escapeHtml(art.title)}</div>
                        <div class="card-meta">${(art.tags || []).slice(0,2).map(t=>`#${escapeHtml(t)}`).join(' ')}</div>
                    </div>
                </div>
            `;
        });
        html += '</div>';
        recDiv.innerHTML = html;
        // attach click handlers
        document.querySelectorAll('#recommendList .article-card').forEach(card => {
            card.addEventListener('click', () => {
                const id = card.getAttribute('data-id');
                const art = allArticles.find(a => a.id === id);
                if (art) openArticleModal(art);
            });
        });
    }

    // Load user dashboard (saved & history)
    async function loadUserDashboard() {
        if (!currentUser) return;
        // saved
        const savedSnap = await db.collection('users').doc(currentUser.uid).collection('saved').get();
        let savedHtml = '';
        for (const doc of savedSnap.docs) {
            const artId = doc.id;
            const article = allArticles.find(a => a.id === artId);
            if (article) {
                savedHtml += `<div class="article-card" data-id="${artId}" style="margin-bottom:0.5rem; padding:0.5rem;">${escapeHtml(article.title)}</div>`;
            }
        }
        if (!savedHtml) savedHtml = '<p>සුරකින ලද ලිපි නැත.</p>';
        document.getElementById('savedList').innerHTML = savedHtml;
        // history
        const historySnap = await db.collection('users').doc(currentUser.uid).collection('history').orderBy('viewedAt', 'desc').limit(10).get();
        let historyHtml = '';
        for (const doc of historySnap.docs) {
            const artId = doc.id;
            const article = allArticles.find(a => a.id === artId);
            if (article) {
                historyHtml += `<div class="article-card" data-id="${artId}" style="margin-bottom:0.5rem; padding:0.5rem;">${escapeHtml(article.title)}</div>`;
            }
        }
        if (!historyHtml) historyHtml = '<p>කියවූ ඉතිහාසය නැත.</p>';
        document.getElementById('historyList').innerHTML = historyHtml;
